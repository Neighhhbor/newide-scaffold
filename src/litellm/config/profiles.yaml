# Reusable model profiles — tasks reference them via `profile: <name>`.

profiles:
  cheap:
    strategy: cheapest
    models:
      - provider: openai
        model: gpt-4o-mini
        order: 1
        costPer1kTokens: 0.00015
      - provider: anthropic
        model: claude-3-5-haiku-latest
        order: 2
        costPer1kTokens: 0.00025
      - provider: google
        model: gemini-2.0-flash-lite
        order: 3
        costPer1kTokens: 0.00008

  balanced:
    strategy: order
    models:
      - provider: openai
        model: gpt-4o-mini
        order: 1
        costPer1kTokens: 0.00015
      - provider: anthropic
        model: claude-3-5-sonnet-latest
        order: 2
        costPer1kTokens: 0.003
      - provider: google
        model: gemini-2.0-flash
        order: 3
        costPer1kTokens: 0.0001

  strong:
    strategy: order
    models:
      - provider: openai
        model: gpt-4o
        order: 1
        costPer1kTokens: 0.0025
      - provider: anthropic
        model: claude-3-5-sonnet-latest
        order: 2
        costPer1kTokens: 0.003
      - provider: google
        model: gemini-2.0-pro
        order: 3
        costPer1kTokens: 0.00125

  coding:
    strategy: order
    timeoutMs: 60000
    maxRetries: 3
    temperature: 0.2
    maxTokens: 8000
    models:
      - provider: openai
        model: gpt-4o
        order: 1
        costPer1kTokens: 0.0025
      - provider: anthropic
        model: claude-3-5-sonnet-latest
        order: 2
        costPer1kTokens: 0.003
