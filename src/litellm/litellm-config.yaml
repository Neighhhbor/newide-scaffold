# ================================================
# LiteLLM Client — Task → Model Pool Configuration
# ================================================
# Edit this file to control which model each task uses.
#
# Strategy options: order | auto | cheapest | fastest
#   order     — try lowest order number first, fallback to next
#   auto      — filter by available API keys, then by order
#   cheapest  — pick the model with lowest costPer1kTokens
#   fastest   — heuristic: flash-lite > mini > flash > haiku > sonnet > rest
#
# Provider options: openai | anthropic | google | azure | ollama
#
# For explicit override, set strategy on a task to:
#   strategy:
#     type: explicit
#     model: openai/gpt-4o

defaults:
  timeoutMs: 30000
  maxRetries: 3
  temperature: 0.3
  maxTokens: 2000

tasks:
  # ── Memory operations — quick & cheap ──
  memory-compact:
    strategy: order
    timeoutMs: 15000
    maxRetries: 2
    temperature: 0.2
    models:
      - litellmModel: claude-opus-4-8
        provider: openai
        order: 1
      - litellmModel: anthropic/claude-3-5-haiku-latest
        provider: anthropic
        order: 2
      - litellmModel: google/gemini-2.0-flash-lite
        provider: google
        order: 3

  memory-query:
    strategy: order
    timeoutMs: 60000
    maxRetries: 2
    temperature: 0.1
    models:
      - litellmModel: claude-opus-4-8
        provider: openai
        order: 1
      - litellmModel: anthropic/claude-3-5-haiku-latest
        provider: anthropic
        order: 2

  # ── Coordination — balanced, needs reasoning ──
  coordinate-plan:
    strategy: order
    timeoutMs: 30000
    maxRetries: 3
    temperature: 0.3
    maxTokens: 4000
    models:
      - litellmModel: claude-opus-4-8
        provider: openai
        order: 1
      - litellmModel: anthropic/claude-3-5-sonnet-latest
        provider: anthropic
        order: 2
      - litellmModel: google/gemini-2.0-flash
        provider: google
        order: 3

  coordinate-delegate:
    strategy: order
    timeoutMs: 10000
    maxRetries: 2
    temperature: 0.2
    models:
      - litellmModel: claude-opus-4-8
        provider: openai
        order: 1
      - litellmModel: google/gemini-2.0-flash-lite
        provider: google
        order: 2

  # ── Classification — very quick ──
  classify-intent:
    strategy: order
    timeoutMs: 8000
    maxRetries: 2
    temperature: 0.1
    maxTokens: 500
    models:
      - litellmModel: claude-opus-4-8
        provider: openai
        order: 1
      - litellmModel: google/gemini-2.0-flash-lite
        provider: google
        order: 2

  classify-priority:
    strategy: order
    timeoutMs: 8000
    maxRetries: 2
    temperature: 0.1
    maxTokens: 500
    models:
      - litellmModel: claude-opus-4-8
        provider: openai
        order: 1

  # ── Summarization — balanced ──
  summarize-chat:
    strategy: order
    timeoutMs: 20000
    maxRetries: 2
    temperature: 0.3
    models:
      - litellmModel: claude-opus-4-8
        provider: openai
        order: 1
      - litellmModel: anthropic/claude-3-5-sonnet-latest
        provider: anthropic
        order: 2

  summarize-thread:
    strategy: order
    timeoutMs: 25000
    maxRetries: 2
    temperature: 0.3
    maxTokens: 3000
    models:
      - litellmModel: claude-opus-4-8
        provider: openai
        order: 1
      - litellmModel: anthropic/claude-3-5-sonnet-latest
        provider: anthropic
        order: 2

  # ── Extraction — strong for reliability ──
  extract-entities:
    strategy: order
    timeoutMs: 20000
    maxRetries: 3
    temperature: 0.1
    models:
      - litellmModel: claude-opus-4-8
        provider: openai
        order: 1
      - litellmModel: anthropic/claude-3-5-sonnet-latest
        provider: anthropic
        order: 2

  # ── Tag generation — quick ──
  generate-tags:
    strategy: order
    timeoutMs: 10000
    maxRetries: 2
    temperature: 0.3
    maxTokens: 1000
    models:
      - litellmModel: claude-opus-4-8
        provider: openai
        order: 1

  # ── Response drafting — stronger ──
  draft-response:
    strategy: order
    timeoutMs: 25000
    maxRetries: 3
    temperature: 0.5
    maxTokens: 4000
    models:
      - litellmModel: claude-opus-4-8
        provider: openai
        order: 1
      - litellmModel: anthropic/claude-3-5-sonnet-latest
        provider: anthropic
        order: 2

  # ── Reflection — strong for quality ──
  reflect-check:
    strategy: order
    timeoutMs: 30000
    maxRetries: 3
    temperature: 0.2
    maxTokens: 3000
    models:
      - litellmModel: openai/gpt-4o
        provider: openai
        order: 1
      - litellmModel: anthropic/claude-3-5-sonnet-latest
        provider: anthropic
        order: 2
      - litellmModel: google/gemini-2.0-pro
        provider: google
        order: 3

  # ── Coding tasks ──
  code-generate:
    strategy: order
    timeoutMs: 60000
    maxRetries: 3
    temperature: 0.2
    maxTokens: 8000
    models:
      - litellmModel: openai/gpt-4o
        provider: openai
        order: 1
      - litellmModel: anthropic/claude-3-5-sonnet-latest
        provider: anthropic
        order: 2

  code-review:
    strategy: order
    timeoutMs: 30000
    maxRetries: 2
    temperature: 0.3
    maxTokens: 4000
    models:
      - litellmModel: claude-opus-4-8
        provider: openai
        order: 1
      - litellmModel: anthropic/claude-3-5-sonnet-latest
        provider: anthropic
        order: 2
