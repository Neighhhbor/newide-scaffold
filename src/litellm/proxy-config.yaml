# LiteLLM Proxy Configuration
# ============================
# Model names here must match the litellmModel field in your TaskModelConfig.
# API keys are read from process.env (no per-task key config).
#
# Environment variables needed:
#   OPENAI_API_KEY      - for openai/* models
#   ANTHROPIC_API_KEY   - for anthropic/* models
#   GOOGLE_API_KEY      - for google/* models
#   AZURE_API_KEY       - for azure/* models
#   OLLAMA_HOST         - for ollama/* models (optional)
#   LITELLM_MASTER_KEY  - for proxy admin

model_list:
  # ── Quick & Cheap: classification, intent detection ──
  - model_name: openai/gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      mode: chat

  - model_name: anthropic/claude-3-5-haiku-latest
    litellm_params:
      model: anthropic/claude-3-5-haiku-latest
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      mode: chat

  - model_name: google/gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/GOOGLE_API_KEY
    model_info:
      mode: chat

  # ── Balanced: summarization, planning, extraction ──
  - model_name: anthropic/claude-3-5-sonnet-latest
    litellm_params:
      model: anthropic/claude-3-5-sonnet-latest
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      mode: chat

  - model_name: google/gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_API_KEY
    model_info:
      mode: chat

  # ── Strong: complex reasoning, code generation ──
  - model_name: openai/gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      mode: chat

  - model_name: google/gemini-2.0-pro
    litellm_params:
      model: gemini/gemini-2.0-pro
      api_key: os.environ/GOOGLE_API_KEY
    model_info:
      mode: chat

  # ── Coding specialized ──
  - model_name: anthropic/claude-3-5-sonnet-latest
    litellm_params:
      model: anthropic/claude-3-5-sonnet-latest
      api_key: os.environ/ANTHROPIC_API_KEY
      tags: ["coding"]

# ── Router Settings ──
router_settings:
  routing_strategy: priority
  num_retries: 2
  timeout: 60
  cooldown_time: 30
  allowed_fails: 2

# ── General Settings ──
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  drop_params: true
  prompt_caching: true
